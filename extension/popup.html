<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 320px;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    color: #333;
  }
  h2 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .url { font-size: 11px; color: #888; word-break: break-all; margin-bottom: 12px; padding: 6px 8px; background: #f5f5f5; border-radius: 4px; max-height: 36px; overflow: hidden; }
  button { width: 100%; padding: 10px; font-size: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
  .btn-capture { background: #1a73e8; color: #fff; }
  .btn-capture:hover { background: #1557b0; }
  .btn-capture:disabled { background: #ccc; cursor: default; }
  .btn-settings { background: #e8f0fe; color: #1a73e8; margin-top: 8px; }
  .btn-settings:hover { background: #d2e3fc; }
  .status { margin-top: 12px; font-size: 13px; line-height: 1.5; }
  .status-loading { color: #1a73e8; }
  .status-success { color: #188038; }
  .status-error { color: #d93025; }
  .hidden { display: none; }
  a { color: #1a73e8; }
</style>
</head>
<body>

<!-- 未配置状态 -->
<div id="state-unconfigured">
  <h2>🔌 扩展未配置</h2>
  <p style="font-size:12px;color:#888;margin-bottom:12px;">
    请前往 Super Admin 设置页授权此扩展。
  </p>
  <button class="btn-settings" id="btn-go-settings">⚙️ 前往设置页</button>
</div>

<!-- 已配置状态 -->
<div id="state-ready">
  <h2>📥 采集当前页</h2>
  <div class="url" id="current-url">加载中...</div>
  <button class="btn-capture" id="btn-capture">📸 开始采集</button>
</div>

<!-- Loading -->
<div id="state-loading" class="hidden">
  <h2>⏳ 采集中...</h2>
  <div class="status status-loading">正在提取 Cookie 和 localStorage，请稍候。</div>
</div>

<!-- 成功 -->
<div id="state-success" class="hidden">
  <h2>✅ 已提交</h2>
  <div class="status status-success">
    采集任务已提交 <span id="job-id-display"></span>
  </div>
  <div style="margin-top:8px;">
    <a id="job-link" href="#" target="_blank">📋 查看任务 →</a>
  </div>
  <div style="font-size:11px;color:#999;margin-top:8px;" id="countdown"></div>
</div>

<!-- 错误 -->
<div id="state-error" class="hidden">
  <h2>❌ 采集失败</h2>
  <div class="status status-error" id="error-message"></div>
  <button class="btn-capture" id="btn-retry" style="margin-top:12px;">🔄 重试</button>
</div>

<script src="popup-script.js"></script>
</body>
</html>
